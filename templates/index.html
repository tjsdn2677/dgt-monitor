<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGT Monitor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <button class="icon-btn">☰</button>

    <div>
        <h1>DGT Monitor</h1>
        <p>동원터미널 작업현황</p>
        <div class="live-row">
            <span>◷</span>
            <span class="time">마지막 갱신 : {{ now }}</span>
            <span class="dot"></span>
            <span>실시간 업데이트</span>
        </div>
    </div>

    <button class="icon-btn" onclick="updateData()">↻</button>
</header>

<main>
    <section class="section-card">
        <div class="section-title">
            <h2>⚓ 선석 작업 현황</h2>
        </div>

        <section class="berth-grid" id="berthGrid"></section>
    </section>

    <section class="schedule-box">
        <div class="section-title">
            <h2>📅 접안 예정</h2>
        </div>
        <div id="scheduleList"></div>
    </section>
</main>

<script>
let previousBerths = {{ berths|tojson }};
let initialSchedules = {{ schedules|tojson }};
let openQcSet = new Set();

function cleanText(value) {
    if (!value) return "-";
    return String(value).replace(/\/20\d{2}/g, "").replace(" 00:00:00", "");
}

function formatShip(value) {
    return cleanText(value);
}

function isEmptyShip(value) {
    const text = formatShip(value).trim();
    return !text || text === "-" || text === "대기중" || text === "없음" || text === "null" || text === "undefined";
}

function splitShipCode(value) {
    const code = cleanText(value);
    if (!code || code === "-") return { code: "-", voyage: "-" };

    const parts = code.split("-");
    return {
        code: parts[0] || "-",
        voyage: parts[1] || "-"
    };
}

function flipPair(value) {
    if (!value || value === "-") return "0 / 0";

    const parts = String(value).split("/").map(v => v.trim());

    if (parts.length !== 2) return value;

    const done = parts[0];
    const total = parts[1];

    return `${total} / ${done}`;
}

function remainText(value) {
    if (!value || value === "-") return "0 / 0";

    const unload = value.match(/양하\s*([0-9]+)/);
    const load = value.match(/적하\s*([0-9]+)/);

    const u = unload ? unload[1] : "0";
    const l = load ? load[1] : "0";

    return `${u} / ${l}`;
}

function getHourRange() {
    const end = new Date();
    const start = new Date(end.getTime() - 60 * 60 * 1000);

    const format = (date) => {
        const h = String(date.getHours()).padStart(2, "0");
        const m = String(date.getMinutes()).padStart(2, "0");
        return `${h}:${m}`;
    };

    return `${format(start)} ~ ${format(end)}`;
}

function getChangeBadge(oldBerth, qcNo, field, newValue) {
    if (!oldBerth || !oldBerth.qc_list) return "";

    const oldQc = oldBerth.qc_list.find(q => q.qc === qcNo);
    if (!oldQc) return "";

    const oldNum = parseInt(oldQc[field]);
    const newNum = parseInt(newValue);

    if (isNaN(oldNum) || isNaN(newNum)) return "";

    const diff = newNum - oldNum;

    if (diff > 0) {
        return `<span class="change-badge">+${diff}</span>`;
    }

    return "";
}

function renderSchedules(schedules) {
    const list = document.getElementById("scheduleList");
    list.innerHTML = "";

    if (!schedules || schedules.length === 0) {
        list.innerHTML = `<p class="empty-schedule">접안 예정 없음</p>`;
        return;
    }

    schedules.forEach(item => {
        list.innerHTML += `
            <div class="schedule-item">
                <div class="schedule-time">
                    <b>${cleanText(item.date)}</b>
                    <span>${cleanText(item.time)}</span>
                </div>

                <span class="schedule-dot"></span>

                <div class="schedule-ship">
                    ${formatShip(item.ship)}
                    <small>${cleanText(item.ship_code)}</small>
                </div>

                <span class="schedule-badge">접안 예정</span>
            </div>
        `;
    });
}

function renderBerths(berths) {
    const grid = document.getElementById("berthGrid");
    grid.innerHTML = "";

    const hourRange = getHourRange();

    berths.forEach(berth => {
        const oldBerth = previousBerths
            ? previousBerths.find(b => b.name === berth.name)
            : null;

        const waiting = isEmptyShip(berth.ship);

        if (waiting) {
            berth.qc_list = [];
            berth.qc = "-";
        } else if (
            (!berth.qc_list || berth.qc_list.length === 0) &&
            oldBerth &&
            oldBerth.qc_list &&
            oldBerth.qc_list.length > 0
        ) {
            berth.qc_list = oldBerth.qc_list;
        }

        const codeInfo = splitShipCode(berth.ship_code);
        const statusText = waiting ? "대기중" : "작업중";
        const statusClass = waiting ? "wait" : "work";
        const openAttr = openQcSet.has(berth.name) ? "open" : "";

        let qcHtml = "";

        if (berth.qc_list && berth.qc_list.length) {
            qcHtml = `
                <details class="qc-details" data-berth="${berth.name}" ${openAttr}>
                    <summary>
                        <span>☷ 상세 보기</span>
                        <b>›</b>
                    </summary>

                    <div class="qc-box">
                        <div class="qc-title">QC별 작업현황</div>

                        ${berth.qc_list.map(qc => `
                            <div class="qc-card">
                                <div class="qc-head">
                                    <b>${qc.qc}호기</b>
                                    <span>${hourRange} +${qc.hourly_count ?? 0}</span>
                                </div>

                                <div class="qc-line">
                                    <span>양하</span>
                                    <b>
                                        ${qc.unload_total ?? "-"} / ${qc.unload_done ?? "-"} / ${qc.unload_remain ?? "-"}
                                        ${getChangeBadge(oldBerth, qc.qc, "unload_done", qc.unload_done)}
                                    </b>
                                </div>

                                <div class="qc-line">
                                    <span>적하</span>
                                    <b>
                                        ${qc.load_total ?? "-"} / ${qc.load_done ?? "-"} / ${qc.load_remain ?? "-"}
                                        ${getChangeBadge(oldBerth, qc.qc, "load_done", qc.load_done)}
                                    </b>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </details>
            `;
        } else {
            qcHtml = `
                <details class="qc-details" data-berth="${berth.name}" ${openAttr}>
                    <summary>
                        <span>☷ 상세 보기</span>
                        <b>›</b>
                    </summary>
                    <div class="qc-box empty-detail">현재 배정 QC 없음</div>
                </details>
            `;
        }

        grid.innerHTML += `
            <div class="berth-card ${waiting ? "waiting-card" : ""}">
                <div class="card-head">
                    <div>
                        <h3>${berth.name}</h3>
                        <h4>${waiting ? "-" : formatShip(berth.ship)}</h4>
                        <p class="ship-code">${codeInfo.code} <span>|</span> 항차: ${codeInfo.voyage}</p>
                    </div>

                    <div class="badge-wrap">
                        <span class="status ${statusClass}">${statusText}</span>
                        <span class="qc-badge">${berth.qc || "-"}</span>
                    </div>
                </div>

                <div class="progress-area">
                    <div class="progress-label">
                        <span>진행률</span>
                        <b>${waiting ? 0 : berth.progress}%</b>
                    </div>

                    <div class="bar">
                        <div style="width:${waiting ? 0 : berth.progress}%"></div>
                    </div>
                </div>

                <div class="work-summary">
                    <div>
                        <span>양하</span>
                        <b>${waiting ? "0 / 0" : flipPair(berth.unload)}</b>
                    </div>

                    <div>
                        <span>적하</span>
                        <b>${waiting ? "0 / 0" : flipPair(berth.load)}</b>
                    </div>

                    <div>
                        <span>잔량</span>
                        <b>${waiting ? "0 / 0" : remainText(berth.remain)}</b>
                    </div>
                </div>

                ${qcHtml}
            </div>
        `;
    });

    document.querySelectorAll(".qc-details").forEach(detail => {
        detail.addEventListener("toggle", () => {
            const berthName = detail.dataset.berth;

            if (detail.open) {
                openQcSet.add(berthName);
            } else {
                openQcSet.delete(berthName);
            }
        });
    });
}

async function updateData() {
    try {
        const response = await fetch("/data");
        const data = await response.json();

        document.querySelector(".time").innerText =
            "마지막 갱신 : " + data.now;

        renderBerths(data.berths || []);
        renderSchedules(data.schedules || []);

        previousBerths = data.berths || [];

    } catch (error) {
        console.error("갱신 실패:", error);
    }
}

renderBerths(previousBerths || []);
renderSchedules(initialSchedules || []);
updateData();

setInterval(updateData, 10000);
</script>

</body>
</html>
